<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>人员管理平台（轻量版）</title>
<style>
  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --line: #e2e8f0;
    --pri: #4f46e5;
    --pri-2: #6366f1;
    --ink: #0f172a;
    --muted: #64748b;
    --ok: #16a34a;
    --ok-bg: #dcfce7;
    --warn: #d97706;
    --warn-bg: #fef3c7;
    --bad: #dc2626;
    --bad-bg: #fee2e2;
    --shadow: 0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 30px rgba(15,23,42,.18);
    --radius: 14px;
    --sidebar: 244px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- 登录 ---------- */
  #login {
    display: none;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(390px, 92vw);
  }
  .auth-card { padding: 28px 26px; border-radius: var(--radius); box-shadow: var(--shadow-lg); }
  .auth-logo {
    width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--pri), #0ea5e9);
    color: #fff; font-weight: 700; font-size: 20px; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(79,70,229,.35);
  }
  .auth-card h2 { text-align: center; margin: 0 0 4px; font-size: 19px; }
  .auth-card .sub { text-align: center; margin: 0 0 20px; }

  /* ---------- 主布局 ---------- */
  #app { display: none; }
  .layout { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar) 1fr; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar);
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0; display: flex; flex-direction: column; padding: 18px 14px;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 18px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 10px; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--pri), #0ea5e9);
    color: #fff; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand b { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
  .brand small { display: block; font-size: 11px; color: #94a3b8; font-weight: 400; }
  #nav { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  #nav button {
    border: none; background: transparent; color: #cbd5e1;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    text-align: left; font-size: 14px; display: flex; align-items: center; gap: 10px;
    transition: background .15s, color .15s;
  }
  #nav button::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: #475569; flex: 0 0 auto; transition: background .15s;
  }
  #nav button:hover { background: rgba(255,255,255,.06); color: #fff; }
  #nav button.active { background: linear-gradient(90deg, rgba(99,102,241,.35), rgba(99,102,241,.08)); color: #fff; }
  #nav button.active::before { background: #818cf8; box-shadow: 0 0 0 3px rgba(129,140,248,.25); }

  .content { display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 22px; display: flex; align-items: center; justify-content: flex-end; gap: 12px;
  }
  .who { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .who b { color: var(--ink); font-weight: 600; }
  .main { padding: 22px; max-width: 1180px; width: 100%; margin: 0 auto; }
  #msg {
    padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; display: none;
    box-shadow: var(--shadow);
  }
  #msg.err { background: var(--bad-bg); color: var(--bad); }
  #msg.ok { background: var(--ok-bg); color: var(--ok); }

  /* ---------- 卡片 / 通用 ---------- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
  h2 { font-size: 16px; margin: 0 0 14px; font-weight: 600; }
  .hint { color: var(--muted); font-size: 12px; line-height: 1.6; }
  .over { color: var(--bad); font-weight: 600; }

  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--muted); }
  input, select {
    padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px;
    font-size: 13px; min-width: 130px; background: #fff; color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--pri-2); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

  .btn {
    background: linear-gradient(135deg, var(--pri), var(--pri-2));
    color: #fff; border: none; padding: 9px 16px; border-radius: 9px;
    cursor: pointer; font-size: 13px; font-weight: 500; transition: filter .15s, transform .05s;
  }
  .btn:hover { filter: brightness(1.07); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: #fff; color: var(--pri); border: 1px solid var(--pri); }
  .btn.ghost:hover { background: #eef2ff; filter: none; }
  .btn.sm { padding: 6px 11px; font-size: 12px; }
  .btn.danger { background: #fff; color: var(--bad); border: 1px solid var(--bad); }
  .btn.danger:hover { background: var(--bad-bg); filter: none; }

  /* ---------- 表格 ---------- */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
  th, td { text-align: left; padding: 11px 13px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; background: #f8fafc; position: sticky; top: 0; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child td { border-bottom: none; }

  /* ---------- 状态标签 ---------- */
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.ok { background: var(--ok-bg); color: var(--ok); }
  .pill.bad { background: var(--bad-bg); color: var(--bad); }
  .pill.warn { background: var(--warn-bg); color: var(--warn); }

  /* ---------- 核算看板（卡片 + 进度条） ---------- */
  .dash-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .dash-head h2 { margin: 0; }
  .dash-head .hint { margin: 2px 0 0; }
  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .project-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 16px 14px; box-shadow: var(--shadow); transition: box-shadow .15s, transform .15s;
  }
  .project-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .pc-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .pc-name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pc-bar { margin: 14px 0 12px; }
  .progress { height: 9px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .progress .fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
  .progress .fill.ok { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .progress .fill.warn { background: linear-gradient(90deg, #fbbf24, #d97706); }
  .progress .fill.over { background: linear-gradient(90deg, #f87171, #dc2626); }
  .pc-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 6px; }
  .pc-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
  .metric .m-label { font-size: 11px; color: var(--muted); }
  .metric .m-value { font-size: 15px; font-weight: 600; margin-top: 1px; }
  .pc-foot { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line); }

  /* ---------- 导入页 ---------- */
  .import-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

  /* ---------- 修改密码 模态 ---------- */
  #cpwd { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 100; padding: 16px; }
  #cpwd .modal-card {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: min(360px, 94vw); padding: 24px; border-radius: var(--radius);
    background: #fff; box-shadow: var(--shadow-lg);
  }

  /* ---------- 响应式 ---------- */
  @media (max-width: 860px) {
    :root { --sidebar: 0px; }
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: static; width: 100%; flex-direction: row; align-items: center;
      padding: 10px 12px; gap: 8px; overflow-x: auto;
    }
    .brand { padding: 0 8px 0 0; flex: 0 0 auto; }
    .brand small { display: none; }
    #nav { flex-direction: row; margin-top: 0; gap: 6px; }
    #nav button { white-space: nowrap; padding: 8px 12px; }
    #nav button::before { display: none; }
    .content { min-width: 0; }
    .main { padding: 14px; }
    .topbar { padding: 10px 14px; }
  }
</style>
</head>
<body>

<div id="login" style="display:none">
  <div class="auth-card card">
    <div class="auth-logo">PM</div>
    <h2>人员管理平台</h2>
    <p class="hint sub">轻量版 · 请登录后使用</p>
    <div class="row" style="flex-direction:column; align-items:stretch;">
      <div class="field"><label>账号</label><input id="lu" value="admin" /></div>
      <div class="field"><label>密码</label><input id="lp" type="password" value="admin123" /></div>
      <button class="btn" style="margin-top:14px" onclick="doLogin()">登 录</button>
      <div class="hint" style="margin-top:12px; text-align:center;">演示账号：admin / employee_a / employee_b / employee_c / depthead（密码均为 admin123）</div>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">PM</span>
        <span><b>人员管理平台</b><small>轻量版 · Personnel</small></span>
      </div>
      <nav id="nav"></nav>
    </aside>
    <div class="content">
      <header class="topbar">
        <div class="who">
          <span><b id="who"></b></span>
          <button class="btn ghost sm" onclick="openChangePwd()">修改密码</button>
          <button class="btn ghost sm" onclick="doLogout()">退出</button>
        </div>
      </header>
      <main class="main">
        <div id="msg"></div>
        <div id="view"></div>
      </main>
    </div>
  </div>
</div>

<div id="cpwd" style="display:none">
  <div class="modal-card">
    <h2>修改密码</h2>
    <div class="row" style="flex-direction:column; align-items:stretch;">
      <div class="field"><label>原密码</label><input id="cp_old" type="password" /></div>
      <div class="field"><label>新密码（至少6位）</label><input id="cp_new" type="password" /></div>
      <button class="btn" style="margin-top:14px" onclick="submitChangePwd()">确认修改</button>
      <button class="btn ghost" style="margin-top:8px" onclick="document.getElementById('cpwd').style.display='none'">取消</button>
    </div>
  </div>
</div>

<script>
const API = "";
let TOKEN = localStorage.getItem("pms_token") || "";
let ME = null;

async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  if (TOKEN) opts.headers["Authorization"] = "Bearer " + TOKEN;
  if (opts.body && !(opts.body instanceof FormData)) opts.headers["Content-Type"] = "application/json";
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); throw new Error("未登录或令牌失效"); }
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error((data && data.detail) || ("错误 " + res.status));
  return data;
}

function msg(text, ok = false) {
  const m = document.getElementById("msg");
  m.textContent = text; m.className = ok ? "ok" : "err"; m.style.display = text ? "block" : "none";
  if (text) setTimeout(() => { m.style.display = "none"; }, 4000);
}

// ---------- 登录 ----------
async function doLogin() {
  try {
    const r = await api("/auth/login", {
      method: "POST",
      body: JSON.stringify({ username: document.getElementById("lu").value, password: document.getElementById("lp").value }),
    });
    TOKEN = r.access_token; ME = r.user;
    localStorage.setItem("pms_token", TOKEN);
    enterApp();
  } catch (e) { msg(e.message); }
}
function doLogout() { logout(); }
function openChangePwd() {
  document.getElementById("cp_old").value = "";
  document.getElementById("cp_new").value = "";
  document.getElementById("cpwd").style.display = "block";
}
async function submitChangePwd() {
  const oldp = document.getElementById("cp_old").value;
  const newp = document.getElementById("cp_new").value;
  try {
    await api("/auth/change-password", { method: "POST", body: JSON.stringify({ old_password: oldp, new_password: newp }) });
    msg("密码已修改，下次登录请使用新密码", true);
    document.getElementById("cpwd").style.display = "none";
  } catch (e) { msg(e.message); }
}
function logout() {
  if (TOKEN) { api("/auth/logout", { method: "POST" }).catch(() => {}); }
  TOKEN = ""; ME = null; localStorage.removeItem("pms_token");
  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "block";
}

async function enterApp() {
  if (!ME) { try { ME = await api("/auth/me"); } catch (e) { logout(); return; } }
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("who").textContent = ME.name + "（" + roleName(ME.role) + "）";
  buildNav();
  show("accounting");
}

function roleName(r) {
  return { admin: "系统管理员", project_leader: "项目负责人", dept_leader: "部门负责人", employee: "普通员工" }[r] || r;
}

// ---------- 导航 ----------
const ENTITIES = {
  departments: { label: "部门", endpoint: "/departments", adminOnly: true,
    fields: [ {k:"name",label:"名称"}, {k:"parent_id",label:"上级ID",type:"number",required:false} ] },
  employees: { label: "员工", endpoint: "/employees", adminOnly: true,
    fields: [ {k:"username",label:"账号"}, {k:"name",label:"姓名"}, {k:"password",label:"密码",default:"admin123"},
      {k:"role",label:"角色",type:"select",options:["admin","project_leader","dept_leader","employee"]},
      {k:"status",label:"状态",type:"select",options:["在岗","休假","出差","待岗"]},
      {k:"dept_id",label:"部门ID",type:"number",required:false} ] },
  projects: { label: "项目", endpoint: "/projects", adminOnly: true,
    fields: [ {k:"name",label:"名称"}, {k:"dept_id",label:"部门ID",type:"number",required:false},
      {k:"leader_emp_id",label:"负责人ID",type:"number",required:false}, {k:"budget",label:"预算",type:"number"},
      {k:"status",label:"状态",type:"select",options:["0","1"]}, {k:"start_date",label:"开始",type:"date",required:false},
      {k:"end_date",label:"结束",type:"date",required:false} ] },
  "unit-prices": { label: "日单价", endpoint: "/unit-prices", adminOnly: true,
    fields: [ {k:"emp_id",label:"员工ID",type:"number"}, {k:"effective_date",label:"生效日期",type:"date"},
      {k:"price",label:"日单价",type:"number"}, {k:"remark",label:"备注",required:false} ] },
  "service-records": { label: "服务记录", endpoint: "/service-records",
    fields: [ {k:"emp_id",label:"员工ID",type:"number"}, {k:"project_id",label:"项目ID",type:"number"},
      {k:"start_date",label:"开始",type:"date"}, {k:"end_date",label:"结束",type:"date"}, {k:"remark",label:"备注",required:false} ] },
  "cost-details": { label: "成本明细", endpoint: "/cost-details",
    fields: [ {k:"project_id",label:"项目ID",type:"number"}, {k:"category",label:"类别"}, {k:"amount",label:"金额",type:"number"},
      {k:"occur_date",label:"发生日期",type:"date",required:false}, {k:"remark",label:"备注",required:false} ] },
};

const TABS = [
  { key: "accounting", label: "核算看板" },
  { key: "departments", label: "部门" },
  { key: "employees", label: "员工" },
  { key: "projects", label: "项目" },
  { key: "unit-prices", label: "日单价" },
  { key: "service-records", label: "服务记录" },
  { key: "cost-details", label: "成本明细" },
  { key: "import", label: "导入" },
];

function buildNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  TABS.forEach(t => {
    const b = document.createElement("button");
    b.textContent = t.label; b.dataset.key = t.key;
    b.onclick = () => show(t.key);
    nav.appendChild(b);
  });
}

function setActive(key) {
  document.querySelectorAll("#nav button").forEach(b => b.classList.toggle("active", b.dataset.key === key));
}

// ---------- 视图 ----------
async function show(key) {
  setActive(key);
  const view = document.getElementById("view");
  view.innerHTML = "";
  if (key === "accounting") return renderAccounting(view);
  if (key === "import") return renderImport(view);
  const cfg = ENTITIES[key];
  await renderCrud(view, cfg);
}

function fmt(v) {
  if (v === null || v === undefined) return "";
  if (typeof v === "number") return String(v);
  return String(v);
}

async function renderCrud(view, cfg) {
  const card = document.createElement("div"); card.className = "card";
  card.innerHTML = "<h2>" + cfg.label + "</h2>";
  view.appendChild(card);

  // 新增表单（管理员专属实体对非管理员隐藏）
  const canWrite = !cfg.adminOnly || (ME && ME.role === "admin");
  if (canWrite) {
    const form = document.createElement("div"); form.className = "row"; form.style.marginBottom = "14px";
    cfg.fields.forEach(f => {
      const wrap = document.createElement("div"); wrap.className = "field";
      const lab = document.createElement("label"); lab.textContent = f.label + (f.required === false ? "" : "*");
      let input;
      if (f.type === "select") {
        input = document.createElement("select");
        f.options.forEach(o => { const op = document.createElement("option"); op.value = o; op.textContent = o; input.appendChild(op); });
      } else {
        input = document.createElement("input");
        input.type = f.type || "text";
        if (f.default) input.value = f.default;
      }
      input.dataset.k = f.k;
      wrap.appendChild(lab); wrap.appendChild(input); form.appendChild(wrap);
    });
    const add = document.createElement("button"); add.className = "btn"; add.textContent = "新增";
    add.onclick = async () => {
      const body = {};
      let ok = true;
      cfg.fields.forEach(f => {
        const el = form.querySelector("[data-k='" + f.k + "']");
        let val = el.value;
        if (f.required === false && val === "") { body[f.k] = null; return; }
        if (f.type === "number") { if (val === "") { if (f.required === false) { body[f.k] = null; return; } val = "0"; } val = Number(val); }
        body[f.k] = val;
      });
      if (!ok) return;
      try { await api(cfg.endpoint, { method: "POST", body: JSON.stringify(body) }); msg("已新增", true); renderCrud(view, cfg); }
      catch (e) { msg(e.message); }
    };
    form.appendChild(add);
    card.appendChild(form);
  } else {
    const hint = document.createElement("div"); hint.className = "hint";
    hint.textContent = "（仅系统管理员可新增/修改" + cfg.label + "）"; card.appendChild(hint);
  }

  // 列表
  try {
    const rows = await api(cfg.endpoint);
    const wrap = document.createElement("div"); wrap.className = "table-wrap";
    const table = document.createElement("table");
    if (!rows.length) { card.appendChild(Object.assign(document.createElement("div"), { className: "hint", textContent: "暂无数据" })); return; }
    const cols = Object.keys(rows[0]);
    const thead = document.createElement("tr");
    cols.forEach(c => { const th = document.createElement("th"); th.textContent = c; thead.appendChild(th); });
    const opth = document.createElement("th"); opth.textContent = "操作"; thead.appendChild(opth);
    const h = document.createElement("thead"); h.appendChild(thead); table.appendChild(h);
    const tb = document.createElement("tbody");
    rows.forEach(r => {
      const tr = document.createElement("tr");
      cols.forEach(c => {
        const td = document.createElement("td");
        if ((c === "price_missing") && r[c]) td.innerHTML = '<span class="pill bad">缺失</span>';
        else if ((c === "over_budget") && r[c]) td.innerHTML = '<span class="pill bad">超支</span>';
        else td.textContent = fmt(r[c]);
        tr.appendChild(td);
      });
      const td = document.createElement("td");
      const del = document.createElement("button"); del.className = "btn danger sm"; del.textContent = "删除";
      del.onclick = async () => { if (!confirm("确认删除？")) return; try { await api(cfg.endpoint + "/" + r.id, { method: "DELETE" }); msg("已删除", true); renderCrud(view, cfg); } catch (e) { msg(e.message); } };
      td.appendChild(del); tr.appendChild(td);
      tb.appendChild(tr);
    });
    table.appendChild(tb); wrap.appendChild(table); card.appendChild(wrap);
  } catch (e) { msg(e.message); }
}

let _cur = "accounting";
function currentKey() { return _cur; }

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function metric(label, value, danger) {
  return '<div class="metric"><div class="m-label">' + label + '</div><div class="m-value' + (danger ? " over" : "") + '">' + value + '</div></div>';
}

async function renderAccounting(view) {
  _cur = "accounting";
  const wrap = document.createElement("div");
  const head = document.createElement("div"); head.className = "dash-head";
  head.innerHTML = '<div><h2 style="margin:0">项目核算看板</h2><div class="hint">预算使用率与超支状态一目了然</div></div>';
  const bar = document.createElement("div"); bar.className = "row"; bar.style.margin = "0";
  if (ME && ME.role === "admin") {
    const rb = document.createElement("button"); rb.className = "btn ghost"; rb.textContent = "全量重算";
    rb.onclick = async () => { try { const r = await api("/accounting/recompute", { method: "POST" }); msg("已重算 " + r.recomputed + " 条", true); renderAccounting(view); } catch (e) { msg(e.message); } };
    bar.appendChild(rb);
    const ex = document.createElement("button"); ex.className = "btn ghost"; ex.textContent = "导出报表";
    ex.onclick = () => { window.open("/accounting/report/export?group_by=monthly", "_blank"); };
    bar.appendChild(ex);
    const exd = document.createElement("button"); exd.className = "btn ghost"; exd.textContent = "导出部门报表";
    exd.onclick = () => { window.open("/accounting/report/export?group_by=dept", "_blank"); };
    bar.appendChild(exd);
  }
  head.appendChild(bar);
  wrap.appendChild(head);
  view.appendChild(wrap);
  try {
    const rows = await api("/accounting/projects");
    if (!rows.length) { wrap.appendChild(Object.assign(document.createElement("div"), { className: "hint", textContent: "暂无项目数据" })); return; }
    const grid = document.createElement("div"); grid.className = "project-grid";
    rows.forEach(r => {
      const over = !!r.over_budget;
      const warn = !over && r.budget > 0 && (r.total_cost / r.budget) >= 0.9;
      const statusClass = over ? "bad" : (warn ? "warn" : "ok");
      const statusText = over ? "超支" : (warn ? "预警" : "正常");
      const usage = r.budget > 0 ? Math.min(100, (r.total_cost / r.budget) * 100) : (over ? 100 : 0);
      const fillClass = over ? "over" : (warn ? "warn" : "ok");
      const card = document.createElement("div"); card.className = "project-card";
      card.innerHTML =
        '<div class="pc-head"><span class="pc-name" title="' + esc(r.name) + '">' + esc(r.name) + '</span>' +
          '<span class="pill ' + statusClass + '">' + statusText + '</span></div>' +
        '<div class="pc-bar"><div class="progress"><div class="fill ' + fillClass + '" style="width:' + usage.toFixed(1) + '%"></div></div>' +
          '<div class="pc-bar-label"><span>预算使用率</span><span>' + usage.toFixed(0) + '%</span></div></div>' +
        '<div class="pc-metrics">' +
          metric("预算", fmt(r.budget)) +
          metric("总支出", fmt(r.total_cost), over) +
          metric("人工产值", fmt(r.labor)) +
          metric("其他成本", fmt(r.other_cost)) +
        '</div>' +
        '<div class="pc-foot"><span>服务数 ' + fmt(r.service_count) + '</span><span>' +
          (r.missing_price_count ? ('<span class="pill bad">缺单价 ' + r.missing_price_count + '</span>') : '单价齐全') +
        '</span></div>';
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
  } catch (e) { msg(e.message); }
}

async function renderImport(view) {
  const card = document.createElement("div"); card.className = "card";
  card.innerHTML = "<h2>导入（CSV / XLSX）</h2>";
  const hint = document.createElement("div"); hint.className = "hint";
  hint.innerHTML = "表头需与字段一致。示例字段：<br>" +
    "员工：username,name,password,role,status,dept_id<br>" +
    "项目：name,dept_id,leader_emp_id,budget,status,start_date,end_date<br>" +
    "日单价：emp_id,effective_date,price,remark<br>" +
    "服务记录：emp_id,project_id,start_date,end_date,remark<br>" +
    "成本明细：project_id,category,amount,occur_date,remark<br>" +
    "（status 取值：在岗/休假/出差/待岗）";
  card.appendChild(hint);
  // 下载模板
  const tplRow = document.createElement("div"); tplRow.className = "row"; tplRow.style.marginTop = "10px";
  tplRow.appendChild(Object.assign(document.createElement("span"), { className: "hint", textContent: "先下载模板填好再导入：" }));
  [["employees","员工模板"],["projects","项目模板"],["unit-prices","日单价模板"],["service-records","服务记录模板"],["cost-details","成本明细模板"]].forEach(([k,l]) => {
    const b = document.createElement("button"); b.className = "btn ghost sm"; b.textContent = l;
    b.onclick = () => { window.open("/import/template/" + k, "_blank"); };
    tplRow.appendChild(b);
  });
  card.appendChild(tplRow);
  const row = document.createElement("div"); row.className = "row"; row.style.marginTop = "12px";
  const sel = document.createElement("select");
  [["employees","员工"],["projects","项目"],["unit-prices","日单价"],["service-records","服务记录"],["cost-details","成本明细"]].forEach(([k,l]) => { const o = document.createElement("option"); o.value = k; o.textContent = l; sel.appendChild(o); });
  const file = document.createElement("input"); file.type = "file"; file.accept = ".csv,.xlsx";
  const btn = document.createElement("button"); btn.className = "btn"; btn.textContent = "上传导入";
  btn.onclick = async () => {
    if (!file.files.length) { msg("请选择文件"); return; }
    const fd = new FormData(); fd.append("file", file.files[0]);
    try { const r = await api("/import/" + sel.value, { method: "POST", body: fd }); msg("已导入 " + r.imported + " 条", true); }
    catch (e) { msg(e.message); }
  };
  row.appendChild(sel); row.appendChild(file); row.appendChild(btn);
  card.appendChild(row); view.appendChild(card);
}
